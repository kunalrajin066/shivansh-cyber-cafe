<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shivansh Cyber Cafe | Patna</title>
    <style>
        /* Base Setup */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            color: #333;
        }

        /* 1. Top Banner Header Area */
        header {
            background-color: #ffffff;
            padding: 0;
            text-align: center;
            border-bottom: 3px solid #0052d4;
        }
        .main-banner {
            width: 100%;
            max-width: 1200px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* Main Container */
        .container {
            width: 90%;
            max-width: 1200px;
            margin: auto;
            padding: 40px 20px;
        }

        .section-title {
            text-align: center;
            font-size: 2rem;
            color: #0052d4;
            margin-bottom: 30px;
            font-weight: 700;
        }

        /* Placeholder For Services (Hum Step-2 Me Banayenge) */
        .coming-soon {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            font-size: 1.2rem;
            color: #666;
        }

        /* Footer */
        footer {
            background-color: #222;
            color: white;
            text-align: center;
            padding: 25px;
            margin-top: 50px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <!-- STEP 1: AAPKA SHOP POSTER BANNER -->
    <header>
        <!-- Agar aapke poster ka naam alag hai (jaise poster.png), toh niche banner.jpg ki jagah wo naam likh dein -->
        <img src="banner.jpg" alt="Shivansh Cyber Cafe Banner" class="main-banner">
    </header>

    <div class="container">
        <h2 class="section-title">Our Digital Services</h2>
        
        <!-- Abhi ke liye placeholder, agle step me yahan dhasu cards aayenge -->
        <div class="coming-soon">
            ⏳ Banner set hone ke baad, hum yahan ek-ek karke aapki saari services jodna shuru karenge...
        </div>
    </div>

    <footer>
        <p>© 2026 Shivansh Cyber Cafe. All Rights Reserved.</p>
        <p style="font-size: 0.8rem; margin-top: 5px; color: #aaa;">Address: Rajeev Nagar Main Road, Opposite Chappan Bhog, Patna</p>
    </footer>

</body>
</html>
